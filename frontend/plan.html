<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>获取计划 - 智能健康助手</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <h2>智能健康助手</h2>
      <div class="nav-links">
        <a href="dashboard.html">仪表板</a>
        <a href="profile.html">健康档案</a>
        <a href="plan.html" class="active">获取计划</a>
        <a href="history.html">历史记录</a>
        <button onclick="logout()" class="btn btn-small">退出</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="plan-section">
      <h1>🎯 生成个性化计划</h1>

      <div class="plan-actions">
        <button onclick="generatePlan()" class="btn btn-primary" id="generateBtn">
          ✨ 生成新计划
        </button>
      </div>

      <div id="planContainer" style="display: none;">
        <div class="card" id="planLoading" style="text-align: center;">
          <p>AI 正在为你生成计划，请稍候...</p>
          <div class="loading-spinner"></div>
        </div>

        <div id="planContent" style="display: none;">
          <h2>📅 本周计划</h2>

          <div class="plan-card">
            <h3>🍽️ 饮食计划</h3>
            <div id="dietPlan"></div>
          </div>

          <div class="plan-card">
            <h3>💪 运动计划</h3>
            <div id="exercisePlan"></div>
          </div>

          <div class="plan-card">
            <h3>💡 健康建议</h3>
            <div id="tips"></div>
          </div>
        </div>
      </div>

      <hr style="margin: 40px 0;">

      <h2>⚖️ 体重记录</h2>
      <div class="weight-form">
        <div class="form-group">
          <label for="weight">当前体重 (kg)</label>
          <input type="number" id="weight" min="30" max="300" step="0.1" placeholder="输入体重">
        </div>

        <div class="form-group">
          <label for="weightNotes">备注（可选）</label>
          <textarea id="weightNotes" placeholder="记录任何相关信息..."></textarea>
        </div>

        <button onclick="recordWeight()" class="btn btn-primary">📊 记录体重</button>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
</body>
</html>
