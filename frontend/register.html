<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 智能健康助手</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <div class="form-container">
      <h1>注册账户</h1>
      <form id="registerForm">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" name="username" placeholder="输入用户名" required>
        </div>

        <div class="form-group">
          <label for="email">邮箱（可选）</label>
          <input type="email" id="email" name="email" placeholder="输入邮箱地址">
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" name="password" placeholder="输入密码" required>
        </div>

        <div class="form-group">
          <label for="confirmPassword">确认密码</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="再次输入密码" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">注册</button>
      </form>

      <p class="form-footer">
        已有账户？<a href="login.html">登录</a>
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await registerUser();
    });
  </script>
</body>
</html>
