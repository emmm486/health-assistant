<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健康档案 - 智能健康助手</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <h2>智能健康助手</h2>
      <div class="nav-links">
        <a href="dashboard.html">仪表板</a>
        <a href="profile.html" class="active">健康档案</a>
        <a href="plan.html">获取计划</a>
        <a href="history.html">历史记录</a>
        <button onclick="logout()" class="btn btn-small">退出</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="form-container">
      <h1>📋 健康档案</h1>
      <form id="profileForm">
        <div class="form-row">
          <div class="form-group">
            <label for="age">年龄</label>
            <input type="number" id="age" name="age" min="10" max="100" placeholder="输入年龄" required>
          </div>

          <div class="form-group">
            <label for="gender">性别</label>
            <select id="gender" name="gender" required>
              <option value="">选择性别</option>
              <option value="male">男</option>
              <option value="female">女</option>
              <option value="other">其他</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="height">身高 (cm)</label>
            <input type="number" id="height" name="height" min="100" max="250" placeholder="输入身高" required>
          </div>

          <div class="form-group">
            <label for="weight">体重 (kg)</label>
            <input type="number" id="weight" name="weight" min="30" max="300" step="0.1" placeholder="输入体重" required>
          </div>
        </div>

        <div class="form-group">
          <label for="activity_level">活动水平</label>
          <select id="activity_level" name="activity_level" required>
            <option value="">选择活动水平</option>
            <option value="low">低（久坐）</option>
            <option value="moderate">中等（每周3-4次运动）</option>
            <option value="high">高（每周5+次运动）</option>
          </select>
        </div>

        <div class="form-group">
          <label for="dietary_preference">饮食偏好</label>
          <select id="dietary_preference" name="dietary_preference" required>
            <option value="">选择饮食偏好</option>
            <option value="vegetarian">素食</option>
            <option value="balanced">均衡饮食</option>
            <option value="high_protein">高蛋白</option>
            <option value="low_carb">低碳水</option>
            <option value="no_restriction">无限制</option>
          </select>
        </div>

        <div class="form-group">
          <label for="health_goal">健康目标</label>
          <select id="health_goal" name="health_goal" required>
            <option value="">选择健康目标</option>
            <option value="weight_loss">减肥</option>
            <option value="muscle_gain">增肌</option>
            <option value="maintain">保持健康</option>
            <option value="athletic">提升体能</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">保存档案</button>
      </form>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', loadProfile);
    document.getElementById('profileForm').addEventListener('submit', saveProfile);
  </script>
</body>
</html>
