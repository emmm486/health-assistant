<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史记录 - 智能健康助手</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <h2>智能健康助手</h2>
      <div class="nav-links">
        <a href="dashboard.html">仪表板</a>
        <a href="profile.html">健康档案</a>
        <a href="plan.html">获取计划</a>
        <a href="history.html" class="active">历史记录</a>
        <button onclick="logout()" class="btn btn-small">退出</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="history-section">
      <h1>📚 历史记录</h1>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('weight')">⚖️ 体重历史</button>
        <button class="tab-btn" onclick="switchTab('plans')">📋 计划历史</button>
      </div>

      <!-- 体重历史 -->
      <div id="weight-tab" class="tab-content active">
        <h2>体重记录</h2>
        <div id="weightHistoryContainer">
          <p>加载中...</p>
        </div>
      </div>

      <!-- 计划历史 -->
      <div id="plans-tab" class="tab-content">
        <h2>历史计划</h2>
        <div id="plansHistoryContainer">
          <p>加载中...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadWeightHistory();
      loadPlanHistory();
    });

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
      document.getElementById(tab + '-tab').classList.add('active');
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
